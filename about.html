<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เกี่ยวกับเรา - IMPACT Sustain</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --impact-blue: #2354a2;
        --border-color: #cbd5e1;
        --text-main: #334155;
        --bg-main: #f8fafc;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Noto Sans Thai", sans-serif;
        background-color: var(--bg-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .navbar {
        height: 80px;
        background: #fff;
        padding: 0 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #e2e8f0;
        z-index: 100;
        flex-shrink: 0;
      }
      .nav-left {
        display: flex;
        align-items: center;
      }
      .nav-menu {
        display: flex;
        gap: 30px;
      }
      .nav-link {
        color: #64748b;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
      }
      .nav-link:hover,
      .nav-link.active {
        color: var(--impact-blue);
        font-weight: 700;
      }

      .main-content {
        display: flex;
        gap: 20px;
        padding: 20px 40px;
        flex: 1;
        overflow: hidden;
      }
      .sidebar {
        width: 280px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
        padding-right: 10px;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .sidebar-item {
        display: flex;
        flex-direction: column;
      }
      .menu-btn {
        background-color: var(--impact-blue);
        color: white;
        padding: 16px 24px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 16px;
        border: none;
        width: 100%;
        justify-content: space-between;
        transition: 0.2s;
        cursor: pointer;
      }
      .menu-btn:hover {
        background-color: #1a407b;
        color: white;
      }
      .menu-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .icon-arrow {
        font-size: 18px;
        transition: 0.3s;
      }
      .menu-btn.collapsed .icon-arrow {
        transform: rotate(-90deg);
      }
      .submenu-wrapper {
        display: grid;
        grid-template-rows: 1fr;
        transition: 0.3s;
        opacity: 1;
      }
      .submenu-wrapper.collapsed {
        grid-template-rows: 0fr;
        opacity: 0;
      }
      .submenu-inner {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding-left: 35px;
        padding-top: 15px;
        padding-bottom: 5px;
      }
      .submenu-link {
        text-decoration: none;
        color: var(--text-main);
        font-weight: 700;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 15px;
        transition: 0.2s;
      }
      .submenu-link:hover,
      .submenu-link.active {
        color: var(--impact-blue);
      }
      .submenu-link i {
        color: #64748b;
        font-size: 18px;
        width: 20px;
        text-align: center;
      }
      .submenu-link:hover i,
      .submenu-link.active i {
        color: var(--impact-blue);
      }

      .main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding-right: 10px;
        padding-bottom: 20px;
      }
      .content-box {
        background: #fff;
        border: 2px solid var(--border-color);
        padding: 40px;
        border-radius: 8px;
      }
      .box-title {
        font-size: 24px;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .about-container {
        display: flex;
        align-items: center;
        gap: 40px;
        justify-content: center;
        padding: 20px;
      }
      .about-logo {
        width: 200px;
      }
      .about-logo img {
        width: 100%;
        object-fit: contain;
      }
      .about-details {
        font-size: 18px;
        color: var(--text-main);
        line-height: 1.8;
      }
      .about-details strong {
        font-size: 20px;
        color: #000;
      }
      .cert-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .cert-item {
        width: 40px;
        height: 40px;
        background: #e2e8f0;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="nav-left">
        <img
          src="images/logo-impact.svg"
          alt="IMPACT"
          height="35"
          onerror="
            this.src =
              'https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/IMPACT_Muang_Thong_Thani_Logo.png/800px-IMPACT_Muang_Thong_Thani_Logo.png'
          "
        />
      </div>
      <div class="nav-menu">
        <a href="index.html" class="nav-link"
          ><i class="fas fa-home"></i> หน้าหลัก</a
        >
        <a href="calculator.html" class="nav-link"
          ><i class="fas fa-leaf"></i> Sustainable Event Design</a
        >
        <a href="event.html" class="nav-link"
          ><i class="fas fa-images"></i> Event Succession Showcase</a
        >
        <a href="network.html" class="nav-link active"
          ><i class="fas fa-network-wired"></i> Network for Knowledge</a
        >
      </div>
    </header>

    <div class="main-content">
      <aside class="sidebar">
        <div class="sidebar-item">
          <button
            class="menu-btn collapsed"
            id="knowledgeToggleBtn"
            onclick="toggleKnowledgeMenu()"
          >
            <div class="menu-left">
              <i class="fas fa-book-open"></i> แหล่งความรู้ทั้งหมด
            </div>
            <i class="fas fa-chevron-down icon-arrow"></i>
          </button>
          <div class="submenu-wrapper collapsed" id="knowledgeSubmenu">
            <div class="submenu-inner">
              <a href="learning.html" class="submenu-link"
                ><i class="far fa-lightbulb"></i> สื่อการเรียนรู้</a
              >
              <a href="video.html" class="submenu-link"
                ><i class="fab fa-youtube"></i> วิดีโอ</a
              >
              <a href="law.html" class="submenu-link"
                ><i class="fas fa-gavel"></i> กฎหมายที่เกี่ยวข้อง</a
              >
            </div>
          </div>
        </div>
        <div class="sidebar-item">
          <a href="sustainability.html" class="menu-btn"
            ><div class="menu-left">
              <i class="fas fa-leaf" style="color: #4caf50"></i>
              อิมแพ็คกับความยั่งยืน
            </div></a
          >
        </div>
        <div class="sidebar-item">
          <a href="faq.html" class="menu-btn"
            ><div class="menu-left">
              <i class="fas fa-question-circle"></i> คำถามที่พบบ่อย
            </div></a
          >
        </div>
        <div class="sidebar-item">
          <a
            href="about.html"
            class="menu-btn"
            style="background-color: #1a407b"
            ><div class="menu-left">
              <i class="fas fa-info-circle"></i> เกี่ยวกับเรา
            </div></a
          >
        </div>
        <div class="sidebar-item">
          <a
            href="reference.html"
            class="menu-btn"
            style="
              background: #fff;
              color: var(--impact-blue);
              border: 2px solid var(--impact-blue);
            "
            ><div class="menu-left">
              <i class="fas fa-link"></i> แหล่งอ้างอิง
            </div></a
          >
        </div>
      </aside>

      <main class="main-area">
        <div class="content-box">
          <div class="box-title">
            <i
              class="fas fa-info-circle"
              style="color: #000; font-size: 30px"
            ></i>
            เกี่ยวกับเรา
          </div>
          <div class="about-container">
            <div class="about-logo">
              <img
                src="images/logo-impact.svg"
                alt="IMPACT Logo"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x80?text=IMPACT+LOGO'
                "
              />
            </div>
            <div class="about-details">
              <strong>Standard Control Department</strong><br />
              <i
                class="fas fa-phone-alt"
                style="color: #64748b; margin-right: 8px"
              ></i>
              02- 8336372, 6373, 6374<br />
              <i
                class="fas fa-envelope"
                style="color: #64748b; margin-right: 8px"
              ></i>
              qa_sdgroup@impact.co.th
              <div class="cert-row">
                <div class="cert-item"></div>
                <div class="cert-item"></div>
                <div class="cert-item"></div>
                <div class="cert-item"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script>
      function toggleKnowledgeMenu() {
        document
          .getElementById("knowledgeToggleBtn")
          .classList.toggle("collapsed");
        document
          .getElementById("knowledgeSubmenu")
          .classList.toggle("collapsed");
      }
    </script>
  </body>
</html>
